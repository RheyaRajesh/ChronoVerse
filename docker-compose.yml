services:
  # --- DATABASE ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chronouser
      POSTGRES_PASSWORD: chronopassword
      POSTGRES_DB: chronoverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- UNIFIED BACKEND ---
  api:
    build: ./services/api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://chronouser:chronopassword@postgres:5432/chronoverse
    depends_on:
      - postgres
    restart: always

  # --- FRONTEND ---
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_WS_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  pgdata:
