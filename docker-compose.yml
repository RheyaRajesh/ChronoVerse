services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chronouser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: chronoverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./services/api
    ports:
      - "4000:4000"
    environment:
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=postgres://chronouser:${DB_PASSWORD}@postgres:5432/chronoverse
    depends_on:
      - kafka
      - postgres
    restart: always

  engine:
    build: ./services/engine
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=postgresql://chronouser:${DB_PASSWORD}@postgres:5432/chronoverse
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
      - kafka

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_ENGINE_URL=http://localhost:8000
      - VITE_WS_URL=http://localhost:4000
    depends_on:
      - api
      - engine
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
