services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chronouser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: chronoverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  gateway:
    build: ./services/gateway
    ports:
      - "4000:4000"
    environment:
      - INGESTION_URL=http://ingestion:4001
    depends_on:
      - ingestion
    volumes:
      - ./services/gateway:/app
      - /app/node_modules

  ingestion:
    build: ./services/ingestion
    ports:
      - "4001:4001"
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - kafka
    restart: always
    volumes:
      - ./services/ingestion:/app
      - /app/node_modules

  event-store:
    build: ./services/event-store
    environment:
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=postgres://chronouser:${DB_PASSWORD}@postgres:5432/chronoverse
    depends_on:
      - kafka
      - postgres
    restart: always

  replay-engine:
    build: ./services/replay-engine
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chronouser:${DB_PASSWORD}@postgres:5432/chronoverse
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/replay-engine:/app
      
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - gateway
      - visualization
    volumes:
      - ./frontend:/app
      - /app/node_modules


  auth:
    build: ./services/auth
    ports:
      - "4002:4002"
    environment:
      - JWT_SECRET=supersecretchronoverse

  projection:
    build: ./services/projection
    environment:
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=postgres://chronouser:${DB_PASSWORD}@postgres:5432/chronoverse
    depends_on:
      - kafka
      - postgres
    restart: always

  visualization:
    build: ./services/visualization
    ports:
      - "4003:4003"
    environment:
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - kafka
    restart: always
    volumes:
      - ./services/visualization:/app
      - /app/node_modules

  ai-analyzer:
    build: ./services/ai-analyzer
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
    depends_on:
      - kafka
      - redis
    restart: on-failure

volumes:
  pgdata:
